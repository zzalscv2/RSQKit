-   abbreviation: community
    description: 'Research software development and maintenance increasingly depend
        on active communities of contributors, users, and stakeholders. A thriving
        community can compensate for technical limitations, ensure long-term viability,and
        drive innovation through collaborative development. For research software,
        community engagement takes on particular importance due to the distributed
        nature of research collaborations, the need for domain-specific expertise,
        and the challenges of sustaining software beyond individual research projects.


        Community health encompasses the social and organisational structures that
        enable effective collaboration, knowledge sharing, and decision-making around
        research software. This includes governance models, contributor engagement
        patterns, communication channels, and the coordination processes that facilitate
        participation across diverse stakeholder groups. The significance of community
        aspects varies by software tier - analysis code may have a single author with
        minimal community interaction, while research software infrastructure requires
        structured community governance and broad stakeholder engagement.


        Community aspects overlap with sustainability and open source dimensions,
        as healthy communities directly contribute to long-term software viability
        and align with open source development practices. Despite this overlap, community
        merits explicit attention as it captures critical social dynamics that determine
        whether research software achieves adoption, maintains quality, and evolves
        to meet changing research needs.'
